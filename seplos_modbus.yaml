# Seplos BMS 3.0 (Mason/10E) via Modbus RTU — paste into configuration.yaml
# Adjust `port:` to your adapter (Settings -> System -> Hardware -> All Hardware)
# and `slave:` to your DIP switch address (all OFF = 0).
modbus:
  - name: seplos_bms
    type: serial
    port: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_XXXXXXXX-if00-port0
    baudrate: 19200
    bytesize: 8
    parity: N
    stopbits: 1
    method: rtu
    sensors:
      - name: "Seplos Pack Voltage"
        unique_id: seplos_pack_voltage
        slave: 0
        address: 4096
        input_type: input
        unit_of_measurement: V
        device_class: voltage
        scale: 0.01
        precision: 2
        scan_interval: 10
      - name: "Seplos Pack Current"
        unique_id: seplos_pack_current
        slave: 0
        address: 4097
        input_type: input
        data_type: int16
        unit_of_measurement: A
        device_class: current
        scale: 0.01
        precision: 2
        scan_interval: 10
      - name: "Seplos Remaining Capacity"
        unique_id: seplos_remaining_capacity
        slave: 0
        address: 4098
        input_type: input
        unit_of_measurement: Ah
        scale: 0.01
        precision: 1
        scan_interval: 60
      - name: "Seplos SOC"
        unique_id: seplos_soc
        slave: 0
        address: 4101
        input_type: input
        unit_of_measurement: "%"
        device_class: battery
        scale: 0.1
        precision: 1
        scan_interval: 30
      - name: "Seplos SOH"
        unique_id: seplos_soh
        slave: 0
        address: 4102
        input_type: input
        unit_of_measurement: "%"
        scale: 0.1
        precision: 1
        scan_interval: 600
      - name: "Seplos Cycles"
        unique_id: seplos_cycles
        slave: 0
        address: 4103
        input_type: input
        scan_interval: 600
      - name: "Seplos Cell 1"
        unique_id: seplos_cell_1
        slave: 0
        address: 4352
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 2"
        unique_id: seplos_cell_2
        slave: 0
        address: 4353
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 3"
        unique_id: seplos_cell_3
        slave: 0
        address: 4354
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 4"
        unique_id: seplos_cell_4
        slave: 0
        address: 4355
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 5"
        unique_id: seplos_cell_5
        slave: 0
        address: 4356
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 6"
        unique_id: seplos_cell_6
        slave: 0
        address: 4357
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 7"
        unique_id: seplos_cell_7
        slave: 0
        address: 4358
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 8"
