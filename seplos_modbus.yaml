        scan_interval: 30
      - name: "Seplos Cell 10"
        unique_id: seplos_cell_10
        slave: 0
        address: 4361
        input_type: input
        unit_of_measurement: mV
        scan_interval: 30
      - name: "Seplos Cell 11"
