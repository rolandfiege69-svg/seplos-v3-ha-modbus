      - name: "Seplos Ambient Temperature"
        unique_id: seplos_ambient_temperature
        slave: 0
        address: 4377
        input_type: input
        unit_of_measurement: "°C"
        device_class: temperature
        scale: 0.1
        offset: -273.15
        precision: 1
        scan_interval: 60
    binary_sensors:
      - name: "Seplos Discharge FET"
        unique_id: seplos_discharge_fet
        slave: 0
        address: 4728
        input_type: coil
        scan_interval: 10
      - name: "Seplos Charge FET"
        unique_id: seplos_charge_fet
        slave: 0
        address: 4729
        input_type: coil
        scan_interval: 10
      - name: "Seplos Discharging"
        unique_id: seplos_discharging
        slave: 0
        address: 4672
        input_type: coil
        scan_interval: 10
      - name: "Seplos Charging"
        unique_id: seplos_charging
        slave: 0
        address: 4673
        input_type: coil
        scan_interval: 10
