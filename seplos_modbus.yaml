# Seplos BMS 3.0 (Mason/10E) via Modbus RTU — paste into configuration.yaml
# Adjust `port:` to your adapter (Settings -> System -> Hardware -> All Hardware)
# and `slave:` to your DIP switch address (all OFF = 0).
modbus:
  - name: seplos_bms
    type: serial
    port: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_XXXXXXXX-if00-port0
    baudrate: 19200
    bytesize: 8
    parity: N
    stopbits: 1
    method: rtu
    sensors:
      - name: "Seplos Pack Spannung"
        unique_id: seplos_pack_spannung
        slave: 0
        address: 4096
        input_type: input
        unit_of_measurement: V
        device_class: voltage
        scale: 0.01
        precision: 2
        scan_interval: 10
      - name: "Seplos Pack Strom"
        unique_id: seplos_pack_strom
        slave: 0
        address: 4097
        input_type: input
        data_type: int16
        unit_of_measurement: A
        device_class: current
        scale: 0.01
        precision: 2
        scan_interval: 10
      - name: "Seplos Restkapazitaet"
        unique_id: seplos_restkapazitaet
        slave: 0
        address: 4098
        input_type: input
        unit_of_measurement: Ah
        scale: 0.01
        precision: 1
        scan_interval: 60
      - name: "Seplos SOC"
        unique_id: seplos_soc
        slave: 0
        address: 4101
        input_type: input
        unit_of_measurement: "%"
        device_class: battery
        scale: 0.1
        precision: 1
        scan_interval: 30
      - name: "Seplos SOH"
        unique_id: seplos_soh
        slave: 0
        address: 4102
        input_type: input
        unit_of_measurement: "%"
        scale: 0.1
        precision: 1
        scan_interval: 600
      - name: "Seplos Zyklen"
        unique_id: seplos_zyklen
        slave: 0
        address: 4103
        input_type: input
        scan_interval: 600
      - name: "Seplos Zelle 1"
